<div class="confirm-dialog">
  <div class="dialog-icon">
    <mat-icon>delete_outline</mat-icon>
  </div>

  <h2 mat-dialog-title>
    {{ data.title }}
  </h2>

  <mat-dialog-content>
    <p>
      {{ data.message }}
    </p>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button
      mat-stroked-button
      type="button"
      class="cancel-button"
      (click)="cancel()"
    >
      {{ data.cancelText || 'Cancel' }}
    </button>

    <button
      mat-flat-button
      type="button"
      class="delete-confirm-button"
      (click)="confirm()"
    >
      {{ data.confirmText || 'Delete' }}
    </button>
  </mat-dialog-actions>
</div>
